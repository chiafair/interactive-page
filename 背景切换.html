<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名片</title>
    <style>
        /* 1. 基础重置与居中 */
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box; /* 推荐加上，防止边框撑开盒子 */
        }

        body {
            /* 让整个 body 变成一个大容器，使 h1 居中 */
            display: flex;
            flex-direction: column; /* 元素垂直排列 */
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5; /* 默认浅色背景 */
            transition: background-color 0.4s ease; /* 背景平滑过渡 */
        }

        /* 2. 深色模式样式 */
        body.dark-mode {
            background-color: #2c3e50;
        }

        /* 3. H1 盒子样式 */
        h1 {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            width: 400px;
            background-color: antiquewhite;
            border-radius: 20px; /* 圆角 */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); /* 加一点阴影更有质感 */
            margin-top: 20px;
        }

        /* 4. 按钮样式 */
        button {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <button id="toggleBtn">切换背景颜色</button>
    
    <h1>个人资料</h1>

    <script>
        // 获取按钮和 body 元素
        const btn = document.getElementById('toggleBtn');
        const body = document.body;

        // 点击事件
        btn.onclick = function() {
            // 在 body 上切换 dark-mode 这个类
            body.classList.toggle('dark-mode');
        };
    </script>
</body>
</html>
